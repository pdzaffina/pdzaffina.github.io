<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <body>

    <header class="blog-masthead" id="blog-nav">
      <div class="blog-nav-inner">
        <a href="https://peter.zaffina.net/" class="blog-nav-logo">Peter Zaffina</a>
        <ul class="blog-nav-links" id="blog-nav-links">
          <li><a href="https://peter.zaffina.net/#services">Services</a></li>
          <li><a href="{{ site.baseurl }}/blog/">Writing</a></li>
          <li><a href="{{ site.baseurl }}/blog/tags">Topics</a></li>
          <li><a href="{{ site.baseurl }}/about">About</a></li>
        </ul>
        <button class="nav-hamburger" id="blog-hamburger" aria-label="Toggle navigation" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
      <div class="nav-drawer" id="blog-drawer" aria-hidden="true">
        <ul>
          <li><a href="https://peter.zaffina.net/#services">Services</a></li>
          <li><a href="{{ site.baseurl }}/blog/">Writing</a></li>
          <li><a href="{{ site.baseurl }}/blog/tags">Topics</a></li>
          <li><a href="{{ site.baseurl }}/about">About</a></li>
        </ul>
      </div>
    </header>

    <main class="blog-main" role="main">
      <div class="blog-content-wrap">
        {{ content }}
      </div>
    </main>

    <footer class="blog-footer">
      <div class="blog-footer-inner">
        <a href="https://peter.zaffina.net/" class="blog-footer-logo">Peter Zaffina</a>
        <ul class="blog-footer-nav">
          <li><a href="https://peter.zaffina.net/">Home</a></li>
          <li><a href="{{ site.baseurl }}/blog/">Writing</a></li>
          <li><a href="{{ site.baseurl }}/blog/tags">Topics</a></li>
          <li><a href="{{ site.baseurl }}/about">About</a></li>
          <li><a href="mailto:peter@zaffina.net">Contact</a></li>
        </ul>
        <p class="blog-footer-copy">&copy; 2026 Peter Zaffina. All rights reserved.</p>
      </div>
    </footer>

    {% include analytics.html %}

    <script>
      const hamburger = document.getElementById('blog-hamburger');
      const drawer    = document.getElementById('blog-drawer');

      function closeNav() {
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        drawer.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
      }

      hamburger.addEventListener('click', () => {
        const isOpen = drawer.classList.toggle('open');
        hamburger.classList.toggle('open', isOpen);
        hamburger.setAttribute('aria-expanded', String(isOpen));
        drawer.setAttribute('aria-hidden', String(!isOpen));
      });

      document.addEventListener('click', e => {
        if (!e.target.closest('#blog-nav')) closeNav();
      });
    </script>

  </body>
</html>
