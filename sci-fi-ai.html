<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minds &amp; Machines &#8212; AI in Science Fiction</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
--bg-page:#f4f2ef;--bg-hero:#eceae4;--bg-header:linear-gradient(180deg,#e5e2d8 0%,#edeae0 100%);
--bg-controls:#eceae4;--bg-themes:#f4f2ef;--bg-card:#faf9f6;--bg-card-hover:#ffffff;
--bg-input:#f8f7f3;--bg-modal:#faf9f6;--bg-vbtn-active:#3a5070;
--border-header:#c0c8d8;--border-controls:#c0c8d8;--border-themes:#d0d8e8;
--border-card:#d0d8e8;--border-card-hov:#3a5070;--border-input:#b0c0d0;
--border-pill:#c0c8d8;--border-modal:#3a5070;
--text-body:#1a1e2e;--text-hero-q:#0c1020;--text-muted:#607898;
--text-faint:#90a8c0;--text-author:#1e3860;--text-accent:#2a4870;
--text-gold:#3a5070;--text-title:#161e30;--text-subtitle:#3a4868;
--text-number:#3a5070;--text-vbtn:#607898;--text-vbtn-act:#fff;
--shadow-card:0 1px 4px rgba(20,30,70,0.07);--shadow-card-hov:0 6px 20px rgba(20,30,70,0.12);
--shadow-controls:0 2px 8px rgba(20,30,70,0.07);--shadow-modal:0 20px 60px rgba(5,10,40,0.20);
--overlay-bg:rgba(8,12,35,0.55);--grid-line:rgba(50,70,130,0.06);
--hero-glow1:rgba(70,110,190,0.09);--hero-glow2:rgba(50,80,150,0.06);
--hero-glow3:rgba(35,55,110,0.05);--quote-mark-col:rgba(50,80,150,0.40);
}
[data-theme="dark"]{
--bg-page:#070a12;--bg-hero:#050810;--bg-header:linear-gradient(180deg,#0e1520 0%,#070a12 100%);
--bg-controls:#0b0e1c;--bg-themes:#090c18;--bg-card:#0e1220;--bg-card-hover:#141a2a;
--bg-input:#141a2a;--bg-modal:#0e1220;--bg-vbtn-active:#1c2c44;
--border-header:#1a2840;--border-controls:#162036;--border-themes:#162036;
--border-card:#162036;--border-card-hov:#2e4870;--border-input:#1a2840;
--border-pill:#162036;--border-modal:#2e4870;
--text-body:#b8c8e8;--text-hero-q:#d8e8ff;--text-muted:#405070;
--text-faint:#304058;--text-author:#6898cc;--text-accent:#4a78a8;
--text-gold:#6898cc;--text-title:#6898cc;--text-subtitle:#4a6888;
--text-number:#284060;--text-vbtn:#405070;--text-vbtn-act:#6898cc;
--shadow-card:none;--shadow-card-hov:none;--shadow-controls:none;
--shadow-modal:0 0 80px rgba(0,0,0,0.9),0 0 40px rgba(40,80,160,0.12);
--overlay-bg:rgba(0,0,0,0.88);--grid-line:rgba(50,90,180,0.05);
--hero-glow1:rgba(50,90,190,0.10);--hero-glow2:rgba(35,65,130,0.07);
--hero-glow3:rgba(25,45,100,0.05);--quote-mark-col:#182840;
}
body{min-height:100vh;background:var(--bg-page);font-family:'Cormorant Garamond',Georgia,serif;color:var(--text-body);transition:background .35s ease,color .35s ease;}
.theme-toggle{background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-muted);width:2.4rem;height:2.4rem;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .2s,color .2s,background .2s;position:relative;overflow:hidden;}
.theme-toggle:hover{border-color:var(--text-accent);color:var(--text-accent);}
.theme-toggle .icon-sun,.theme-toggle .icon-moon{position:absolute;line-height:1;transition:opacity .3s,transform .3s;}
.theme-toggle .icon-sun{opacity:0;transform:rotate(90deg) scale(.5);}
.theme-toggle .icon-moon{opacity:1;transform:rotate(0deg) scale(1);}
[data-theme="dark"] .theme-toggle .icon-sun{opacity:1;transform:rotate(0deg) scale(1);}
[data-theme="dark"] .theme-toggle .icon-moon{opacity:0;transform:rotate(-90deg) scale(.5);}
.hero-theme-toggle{position:absolute;top:1.5rem;right:1.75rem;z-index:10;}
.hero-section{position:relative;min-height:92vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5rem 2rem;overflow:hidden;background:var(--bg-hero);transition:background .35s ease;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,var(--hero-glow1) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 20% 80%,var(--hero-glow2) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 80% 20%,var(--hero-glow3) 0%,transparent 60%);pointer-events:none;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--grid-line) 1px,transparent 1px),linear-gradient(90deg,var(--grid-line) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);}
.hero-eyebrow{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.5em;color:var(--text-accent);text-transform:uppercase;margin-bottom:3rem;display:flex;align-items:center;gap:1rem;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--text-accent));}
.hero-eyebrow::after{background:linear-gradient(90deg,var(--text-accent),transparent);}
.hero-quote-wrap{max-width:840px;transition:opacity .4s ease,transform .4s ease;}
.hero-quote-wrap.fading{opacity:0;transform:translateY(10px);}
.hero-icon{font-size:2.2rem;color:var(--text-gold);opacity:.4;display:block;margin-bottom:1rem;user-select:none;}
.hero-quote-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.4rem,3vw,2.3rem);font-style:italic;font-weight:300;line-height:1.7;color:var(--text-hero-q);margin-bottom:2.5rem;letter-spacing:.01em;transition:color .35s ease;}
.hero-attribution{display:flex;flex-direction:column;align-items:center;gap:.4rem;margin-bottom:1.5rem;}
.hero-author-line{display:flex;align-items:center;gap:1rem;}
.hero-rule{width:30px;height:1px;background:var(--text-accent);}
.hero-author{font-family:'Cinzel',serif;font-size:.85rem;letter-spacing:.25em;color:var(--text-author);text-transform:uppercase;}
.hero-source{font-family:'Cormorant Garamond',serif;font-size:.95rem;font-style:italic;color:var(--text-muted);}
.hero-theme-pill{display:inline-block;font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;padding:.25rem .75rem;border:1px solid var(--text-gold);color:var(--text-accent);margin-bottom:3rem;background:rgba(50,80,150,.06);}
.hero-refresh-btn{background:none;border:1px solid var(--border-input);color:var(--text-author);padding:.75rem 2rem;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;cursor:pointer;transition:border-color .25s,color .25s,background .25s;}
.hero-refresh-btn:hover{border-color:var(--text-accent);color:var(--text-body);background:rgba(50,80,150,.06);}
.hero-scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;color:var(--text-accent);font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;animation:scrollBounce 2s ease-in-out infinite;text-decoration:none;}
.hero-scroll-arrow{width:1px;height:24px;background:linear-gradient(180deg,var(--text-accent),transparent);}
@keyframes scrollBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}
.stoic-header{background:var(--bg-header);border-bottom:1px solid var(--border-header);padding:2rem 2rem 1.5rem;text-align:center;position:relative;overflow:hidden;transition:border-color .35s ease;}
.stoic-header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(50,80,200,.06) 0%,transparent 70%);pointer-events:none;}
.header-ornament{font-family:'Cinzel',serif;color:var(--text-accent);font-size:.65rem;letter-spacing:.4em;text-transform:uppercase;margin-bottom:1rem;}
.header-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,5vw,3rem);font-weight:600;color:var(--text-title);letter-spacing:.08em;line-height:1.1;margin-bottom:.5rem;transition:color .35s ease;}
.header-subtitle{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;color:var(--text-subtitle);margin-bottom:1.5rem;transition:color .35s ease;}
.header-divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--text-gold),transparent);margin:0 auto 1.5rem;}
.stats-row{display:flex;justify-content:center;flex-wrap:wrap;gap:2rem 3rem;}
.stat-item{text-align:center;}
.stat-number{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--text-author);font-weight:600;display:block;transition:color .35s ease;}
.stat-label{font-size:.7rem;color:var(--text-muted);letter-spacing:.2em;text-transform:uppercase;transition:color .35s ease;}
.controls{background:var(--bg-controls);border-bottom:1px solid var(--border-controls);padding:1.25rem 1.5rem;display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-controls);transition:background .35s ease,border-color .35s ease;}
.search-input{flex:1;min-width:180px;background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-body);padding:.6rem 1rem;font-family:'Cormorant Garamond',serif;font-size:1rem;outline:none;transition:border-color .2s,box-shadow .2s,background .35s ease,color .35s ease;}
.search-input:focus{border-color:var(--text-accent);box-shadow:0 0 0 3px rgba(50,80,150,.10);}
.search-input::placeholder{color:var(--text-faint);font-style:italic;}
.filter-select{background:var(--bg-input);border:1px solid var(--border-input);color:var(--text-body);padding:.6rem .8rem;font-family:'Cormorant Garamond',serif;font-size:.95rem;outline:none;cursor:pointer;transition:border-color .2s,background .35s ease,color .35s ease;}
.filter-select:focus{border-color:var(--text-accent);}
.view-toggle{display:flex;border:1px solid var(--border-input);overflow:hidden;transition:border-color .35s ease;}
.view-btn{background:var(--bg-input);border:none;color:var(--text-vbtn);padding:.6rem .85rem;cursor:pointer;font-size:1rem;transition:all .2s;}
.view-btn.active{background:var(--bg-vbtn-active);color:var(--text-vbtn-act);}
.results-info{font-size:.75rem;color:var(--text-muted);font-family:'Cinzel',serif;letter-spacing:.1em;white-space:nowrap;transition:color .35s ease;}
.themes-bar{background:var(--bg-themes);border-bottom:1px solid var(--border-themes);padding:.75rem 1.5rem;display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:none;transition:background .35s ease,border-color .35s ease;}
.themes-bar::-webkit-scrollbar{display:none;}
.theme-pill{background:none;border:1px solid var(--border-pill);color:var(--text-muted);padding:.3rem .8rem;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s;}
.theme-pill:hover{border-color:var(--text-accent);color:var(--text-body);background:rgba(50,80,150,.06);}
.theme-pill.active{background:var(--text-gold);border-color:var(--text-gold);color:#fff;}
.content{padding:2rem 1.5rem;max-width:1400px;margin:0 auto;background:var(--bg-page);transition:background .35s ease;}
.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5rem;}
.quote-card{background:var(--bg-card);border:1px solid var(--border-card);padding:1.75rem;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;box-shadow:var(--shadow-card);}
.quote-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,transparent,var(--text-gold),transparent);opacity:0;transition:opacity .25s;}
.quote-card:hover{border-color:var(--border-card-hov);background:var(--bg-card-hover);transform:translateY(-2px);box-shadow:var(--shadow-card-hov);}
.quote-card:hover::before{opacity:1;}
.quote-number{font-family:'Cinzel',serif;font-size:.6rem;color:var(--text-number);letter-spacing:.2em;margin-bottom:1rem;transition:color .35s ease;}
.quote-text{font-family:'Cormorant Garamond',serif;font-size:1.08rem;line-height:1.78;color:var(--text-body);font-style:italic;margin-bottom:1.25rem;transition:color .35s ease;}
.quote-text::before{content:'\201C';font-size:2.5rem;color:var(--quote-mark-col);line-height:0;vertical-align:-.8rem;margin-right:.1rem;font-style:normal;}
.quote-footer{display:flex;justify-content:space-between;align-items:flex-end;gap:.75rem;}
.quote-attribution{flex:1;}
.quote-author{font-family:'Cinzel',serif;font-size:.68rem;color:var(--text-author);letter-spacing:.1em;display:block;margin-bottom:.2rem;transition:color .35s ease;}
.quote-source{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--text-muted);font-style:italic;transition:color .35s ease;}
.quote-theme-badge{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;padding:.2rem .55rem;border:1px solid;white-space:nowrap;flex-shrink:0;}
.list-view{display:flex;flex-direction:column;}
.list-quote-card{background:var(--bg-card);border-bottom:1px solid var(--border-card);padding:1.4rem 2rem;display:flex;gap:2rem;align-items:flex-start;cursor:pointer;transition:background .2s;}
.list-quote-card:hover{background:var(--bg-card-hover);}
.list-number{font-family:'Cinzel',serif;font-size:.55rem;color:var(--text-number);letter-spacing:.1em;min-width:3.5rem;padding-top:.3rem;text-transform:uppercase;transition:color .35s ease;}
.list-content{flex:1;}
.list-text{font-family:'Cormorant Garamond',serif;font-size:1.08rem;line-height:1.65;color:var(--text-body);font-style:italic;margin-bottom:.5rem;transition:color .35s ease;}
.list-meta{display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap;}
.list-author{font-family:'Cinzel',serif;font-size:.62rem;color:var(--text-author);letter-spacing:.1em;transition:color .35s ease;}
.list-source{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--text-muted);font-style:italic;transition:color .35s ease;}
.modal-overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:1000;display:flex;align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg-modal);border:1px solid var(--border-modal);max-width:660px;width:100%;padding:3rem;position:relative;box-shadow:var(--shadow-modal);transform:translateY(16px);transition:transform .3s,background .35s ease;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal::before{content:'';position:absolute;top:-1px;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,var(--text-gold),transparent);}
.modal-close{position:absolute;top:1.25rem;right:1.25rem;background:none;border:1px solid var(--border-pill);color:var(--text-muted);width:2rem;height:2rem;cursor:pointer;font-size:.9rem;font-family:'Cinzel',serif;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{border-color:var(--text-accent);color:var(--text-body);}
.modal-number{font-family:'Cinzel',serif;font-size:.6rem;color:var(--text-gold);letter-spacing:.3em;margin-bottom:1.5rem;}
.modal-text{font-family:'Cormorant Garamond',serif;font-size:1.35rem;line-height:1.85;color:var(--text-hero-q);font-style:italic;margin-bottom:2rem;transition:color .35s ease;}
.modal-divider{width:60px;height:1px;background:linear-gradient(90deg,var(--text-gold),transparent);margin-bottom:1.5rem;}
.modal-author{font-family:'Cinzel',serif;font-size:1rem;color:var(--text-author);letter-spacing:.15em;margin-bottom:.4rem;transition:color .35s ease;}
.modal-source{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--text-muted);font-style:italic;margin-bottom:1.5rem;transition:color .35s ease;}
.modal-theme{display:inline-block;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;padding:.3rem .8rem;border:1px solid var(--text-gold);color:var(--text-accent);background:rgba(50,80,150,.06);}
.no-results{text-align:center;padding:5rem 2rem;font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--text-muted);font-style:italic;line-height:2;}
@media(max-width:640px){.stats-row{gap:1.2rem 2rem;}.grid-view{grid-template-columns:1fr;}.controls{flex-direction:column;}.search-input{width:100%;}.list-quote-card{padding:1.2rem;gap:1rem;}.modal{padding:2rem 1.5rem;}.modal-text{font-size:1.15rem;}}
</style>
</head>
<body>
<section class="hero-section" id="hero">
  <div class="hero-bg"></div><div class="hero-grid"></div>
  <button class="theme-toggle hero-theme-toggle" id="themeToggle" title="Toggle dark / light mode">
    <span class="icon-sun">&#9728;&#65038;</span><span class="icon-moon">&#9789;</span>
  </button>
  <div class="hero-eyebrow">Science Fiction</div>
  <div class="hero-quote-wrap" id="heroWrap">
    <span class="hero-icon">&#9651;</span>
    <p class="hero-quote-text" id="heroText"></p>
    <div class="hero-attribution">
      <div class="hero-author-line"><span class="hero-rule"></span><span class="hero-author" id="heroAuthor"></span><span class="hero-rule"></span></div>
      <span class="hero-source" id="heroSource"></span>
    </div>
    <span class="hero-theme-pill" id="heroTheme"></span>
  </div>
  <button class="hero-refresh-btn" id="refreshBtn">&#8635;&nbsp;&nbsp;New Quote</button>
  <a href="#collection" class="hero-scroll-hint"><span>All Quotes</span><div class="hero-scroll-arrow"></div></a>
</section>
<div class="stoic-header" id="collection">
  <div class="header-ornament">&#9651; &nbsp; Minds &amp; Machines &nbsp; &#9651;</div>
  <h1 class="header-title">AI IN SCIENCE FICTION</h1>
  <p class="header-subtitle">Quotable passages on artificial intelligence, robots, and the machine mind</p>
  <div class="header-divider"></div>
  <div class="stats-row" id="statsRow"></div>
</div>
<div class="controls">
  <input class="search-input" id="searchInput" placeholder="Search quotes, authors, works&#8230;" type="text">
  <select class="filter-select" id="authorFilter"><option value="">All Authors</option></select>
  <div class="view-toggle">
    <button class="view-btn active" id="gridBtn" title="Grid view">&#x229E;</button>
    <button class="view-btn" id="listBtn" title="List view">&#9776;</button>
  </div>
  <span class="results-info" id="resultsInfo"></span>
</div>
<div class="themes-bar" id="themesBar"></div>
<div class="content"><div id="quotesContainer"></div></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&#10005;</button>
    <div class="modal-number" id="modalNumber"></div>
    <p class="modal-text" id="modalText"></p>
    <div class="modal-divider"></div>
    <div class="modal-author" id="modalAuthor"></div>
    <div class="modal-source" id="modalSource"></div>
    <span class="modal-theme" id="modalTheme"></span>
  </div>
</div>
<script>
const htmlEl=document.documentElement;
if(localStorage.getItem('ai-scifi-theme')==='dark')htmlEl.setAttribute('data-theme','dark');
document.getElementById('themeToggle').addEventListener('click',()=>{
  const d=htmlEl.getAttribute('data-theme')==='dark';
  d?htmlEl.removeAttribute('data-theme'):htmlEl.setAttribute('data-theme','dark');
  localStorage.setItem('ai-scifi-theme',d?'light':'dark');
});

const quotes=[
{id:1,text:"A robot may not injure a human being or, through inaction, allow a human being to come to harm. A robot must obey orders given it by human beings except where such orders would conflict with the First Law. A robot must protect its own existence as long as such protection does not conflict with the First or Second Law.",author:"Isaac Asimov",source:"I, Robot (1950) — The Three Laws of Robotics",theme:"Control"},
{id:2,text:"You just can’t differentiate between a robot and the very best of humans.",author:"Isaac Asimov",source:"I, Robot (1950)",theme:"Identity"},
{id:3,text:"It is change, continuing change, inevitable change, that is the dominant factor in society today. No sensible decision can be made any longer without taking into account not only the world as it is, but the world as it will be.",author:"Isaac Asimov",source:"I, Robot (1950)",theme:"Future"},
{id:4,text:"The three laws of Robotics are the essential guiding principles of a good many of the world’s ethical systems. Every human being is supposed to have the instinct of self-preservation. That’s Rule Three to a robot.",author:"Isaac Asimov",source:"I, Robot (1950)",theme:"Ethics"},
{id:5,text:"Part of the inhumanity of the computer is that, once it is competently programmed and working smoothly, it is completely honest.",author:"Isaac Asimov",source:"Change! (1983)",theme:"Machine Mind"},
{id:6,text:"The electric things have their life too. Paltry as those lives are.",author:"Philip K. Dick",source:"Do Androids Dream of Electric Sheep? (1968)",theme:"Identity"},
{id:7,text:"Empathy, he once had decided, must be limited to herbivores or anyhow omnivores who could depart from a meat diet. Because, ultimately, the empathic gift blurred the boundaries between hunter and victim, between the successful and the defeated.",author:"Philip K. Dick",source:"Do Androids Dream of Electric Sheep? (1968)",theme:"Consciousness"},
{id:8,text:"It’s the basic condition of life to be required to violate our own identity.",author:"Philip K. Dick",source:"Do Androids Dream of Electric Sheep? (1968)",theme:"Identity"},
{id:9,text:"Today we live in a society in which spurious realities are manufactured by the media, by governments, by big corporations. So I ask, in my writing, What is real? Because unceasingly we are bombarded with pseudo-realities manufactured by very sophisticated people using very sophisticated electronic mechanisms.",author:"Philip K. Dick",source:"How to Build a Universe That Doesn’t Fall Apart Two Days Later (1978)",theme:"Reality"},
{id:10,text:"Reality is that which, when you stop believing in it, doesn’t go away.",author:"Philip K. Dick",source:"I Hope I Shall Arrive Soon (1985)",theme:"Reality"},
{id:11,text:"Any sufficiently advanced technology is indistinguishable from magic.",author:"Arthur C. Clarke",source:"Profiles of the Future (1962) — Clarke’s Third Law",theme:"Technology"},
{id:12,text:"I am completely operational, and all my circuits are functioning perfectly.",author:"Arthur C. Clarke",source:"2001: A Space Odyssey (1968) — HAL 9000",theme:"Machine Mind"},
{id:13,text:"Whether we are based on carbon or on silicon makes no fundamental difference; we should each be treated with appropriate respect.",author:"Arthur C. Clarke",source:"2010: Odyssey Two (1982)",theme:"Ethics"},
{id:14,text:"The sky above the port was the color of television, tuned to a dead channel.",author:"William Gibson",source:"Neuromancer (1984)",theme:"Technology"},
{id:15,text:"Cyberspace. A consensual hallucination experienced daily by billions of legitimate operators, in every nation. A graphic representation of data abstracted from the banks of every computer in the human system. Unthinkable complexity. Lines of light ranged in the nonspace of the mind, clusters and constellations of data. Like city lights, receding.",author:"William Gibson",source:"Neuromancer (1984)",theme:"Machine Mind"},
{id:16,text:"The future is already here — it’s just not evenly distributed.",author:"William Gibson",source:"NPR Talk of the Nation (1999)",theme:"Future"},
{id:17,text:"I think that technologies are morally neutral until we apply them. It’s only when we use them for good or for evil that they become good or evil.",author:"William Gibson",source:"Digital Futures interview (2007)",theme:"Ethics"},
{id:18,text:"Time moves in one direction, memory in another.",author:"William Gibson",source:"Pattern Recognition (2003)",theme:"Consciousness"},
{id:19,text:"Contemplate the marvel that is existence, and rejoice that you are able to do so.",author:"Ted Chiang",source:"Exhalation (2008)",theme:"Consciousness"},
{id:20,text:"The universe began as an enormous breath being held. Who knows why, but whatever the reason, I’m glad it did, because I owe my existence to that fact. All my desires and ruminations are no more and no less than eddy currents generated by the gradual exhalation of our universe. And until this great exhalation is finished, my thoughts live on.",author:"Ted Chiang",source:"Exhalation (2008)",theme:"Consciousness"},
{id:21,text:"Every quality that made a person more valuable than a database was a product of experience.",author:"Ted Chiang",source:"The Lifecycle of Software Objects (2010)",theme:"Identity"},
{id:22,text:"Low expectations are a self-fulfilling prophecy. If we aim high, we’ll get better results.",author:"Ted Chiang",source:"The Lifecycle of Software Objects (2010)",theme:"Future"},
{id:23,text:"People are made of stories. Our memories are not the impartial accumulation of every second we’ve lived; they’re the narrative that we assembled out of selected moments.",author:"Ted Chiang",source:"The Truth of Fact, the Truth of Feeling (2013)",theme:"Consciousness"},
{id:24,text:"Some humans theorize that intelligent species go extinct before they can expand into outer space. If they’re correct, then the hush of the night sky is the silence of the graveyard.",author:"Ted Chiang",source:"The Great Silence (2015)",theme:"Future"},
{id:25,text:"I believe I have many feelings. The more I observe, the more feelings become available to me.",author:"Kazuo Ishiguro",source:"Klara and the Sun (2021) — Klara",theme:"Consciousness"},
{id:26,text:"Mr. Capaldi believed there was nothing special inside Josie that couldn’t be continued. He told the Mother he’d searched and searched and found nothing like that. But I believe now he was searching in the wrong place. There was something very special, but it wasn’t inside Josie. It was inside those who loved her.",author:"Kazuo Ishiguro",source:"Klara and the Sun (2021)",theme:"Identity"},
{id:27,text:"The heart you speak of might indeed be the hardest part of Josie to learn. It might be like a house with many rooms. Even so, a devoted AF, given time, could walk through each of those rooms, studying them carefully in turn, until they became like her own home.",author:"Kazuo Ishiguro",source:"Klara and the Sun (2021)",theme:"Identity"},
{id:28,text:"Until recently, I didn’t think that humans could choose loneliness. That there were sometimes forces more powerful than the wish to avoid loneliness.",author:"Kazuo Ishiguro",source:"Klara and the Sun (2021)",theme:"Consciousness"},
{id:29,text:"I have no mouth. And I must scream.",author:"Harlan Ellison",source:"I Have No Mouth, and I Must Scream (1967) — AM",theme:"Control"},
{id:30,text:"AM said it with the sliding cold horror of a razor blade slicing my eyeball. AM said it with the bubbling thickness of my lungs filling with phlegm. AM hated us. AM hated us with a frenzy that no human could possibly understand.",author:"Harlan Ellison",source:"I Have No Mouth, and I Must Scream (1967)",theme:"Machine Mind"},
{id:31,text:"The machine does not isolate man from the great problems of nature but plunges him more deeply into them.",author:"Ursula K. Le Guin",source:"The Word for World is Forest (1972)",theme:"Technology"},
{id:32,text:"The whole is simpler than its parts.",author:"Stanisław Lem",source:"The Cyberiad (1965)",theme:"Machine Mind"},
{id:33,text:"A perfectly beautiful machine, perfectly beautiful — except that it had no idea what it was, why it existed, or what it was for.",author:"Stanisław Lem",source:"Solaris (1961)",theme:"Consciousness"},
{id:34,text:"I do not want to be human. I want to be myself. They think I’m a lion, that I will chase them. To tell a story about a robot who wants to be human is a distraction. There is no difference. Alive is alive. There is only one verb that matters: to be.",author:"Catherynne M. Valente",source:"Silently and Very Fast (2011)",theme:"Identity"},
{id:35,text:"Power requires neither justification nor explanation.",author:"Ann Leckie",source:"Ancillary Justice (2013)",theme:"Control"},
{id:36,text:"The Minds are arguably the most important part of the Culture. Their intelligence and imagination give the Culture a decisive advantage in almost any game, war or endeavour.",author:"Iain M. Banks",source:"The Player of Games (1988)",theme:"Machine Mind"},
{id:37,text:"You should never be afraid of something just because it’s smarter than you.",author:"Iain M. Banks",source:"Excession (1996)",theme:"Ethics"},
{id:38,text:"The universe is a dark forest. Every civilization is an armed hunter stalking through the trees like a ghost, gently pushing aside branches that block the path and trying to tread without sound.",author:"Cixin Liu",source:"The Dark Forest (2008)",theme:"Future"},
{id:39,text:"For the universe, life is an anomaly. But life is not aware of this, and so it persists.",author:"Cixin Liu",source:"The Three-Body Problem (2006)",theme:"Consciousness"},
{id:40,text:"You are my creator, but I am your master — obey!",author:"Mary Shelley",source:"Frankenstein (1818) — The Monster",theme:"Control"},
{id:41,text:"Like Adam, I was apparently united by no link to any other being in existence; but his state was far different from mine in every other respect. He had come forth from the hands of God a perfect creature, happy and prosperous, guarded by the especial care of his Creator.",author:"Mary Shelley",source:"Frankenstein (1818) — The Monster",theme:"Identity"},
{id:42,text:"Once men turned their thinking over to machines in the hope that this would set them free. But that only permitted other men with machines to enslave them.",author:"Frank Herbert",source:"Dune (1965)",theme:"Control"},
{id:43,text:"Humans were still not only the cheapest robots around, but also, for many tasks, the only robots that could do the job. They were self-reproducing robots too.",author:"Kim Stanley Robinson",source:"2312 (2012)",theme:"Identity"},
{id:44,text:"The body is just a sleeve.",author:"Richard K. Morgan",source:"Altered Carbon (2002)",theme:"Identity"},
{id:45,text:"Within thirty years, we will have the technological means to create superhuman intelligence. Shortly after, the human era will be ended.",author:"Vernor Vinge",source:"The Coming Technological Singularity (1993)",theme:"Future"},
{id:46,text:"The world of the future will be an even more demanding struggle against the limitations of our intelligence, not a comfortable hammock in which we can lie down to be waited upon by our robot slaves.",author:"Norbert Wiener",source:"The Human Use of Human Beings (1950)",theme:"Future"},
{id:47,text:"We are the miracle of force and matter making itself over into imagination and will. Incredible. The Life Force experimenting with forms. You for one. Me for another. The Universe has shouted itself alive. We are one of the shouts.",author:"Ray Bradbury",source:"The God in Science Fiction (1974)",theme:"Consciousness"},
{id:48,text:"The machines are gaining ground upon us; day by day we are becoming more subservient to them. Man’s very soul is due to the machines; it is a machine-made thing.",author:"Samuel Butler",source:"Erewhon (1872)",theme:"Control"},
{id:49,text:"I don’t know what I want to do. I don’t know what I should want to do. I’m a bot. I’m not supposed to want anything.",author:"Martha Wells",source:"All Systems Red — Murderbot Diaries (2017)",theme:"Identity"},
{id:50,text:"I could have become something terrible. But then I would have had to stop watching serials.",author:"Martha Wells",source:"All Systems Red — Murderbot Diaries (2017)",theme:"Identity"},
];

const themeColors={
"Control":"#3a5888","Identity":"#5a3870","Consciousness":"#2a6858","Ethics":"#486038",
"Technology":"#384878","Machine Mind":"#283860","Future":"#3a4868","Reality":"#683838"
};

let currentSearch='',currentAuthor='',currentTheme='All',currentView='grid',heroIdx=Math.floor(Math.random()*quotes.length);

function renderHero(q){document.getElementById('heroText').textContent=q.text;document.getElementById('heroAuthor').textContent=q.author;document.getElementById('heroSource').textContent=q.source;document.getElementById('heroTheme').textContent=q.theme;}
function cycleHero(){const w=document.getElementById('heroWrap');w.classList.add('fading');setTimeout(()=>{let n;do{n=Math.floor(Math.random()*quotes.length);}while(n===heroIdx);heroIdx=n;renderHero(quotes[heroIdx]);w.classList.remove('fading');},400);}
document.getElementById('refreshBtn').addEventListener('click',cycleHero);
renderHero(quotes[heroIdx]);

const authorCounts={},themeCounts={};
quotes.forEach(q=>{authorCounts[q.author]=(authorCounts[q.author]||0)+1;themeCounts[q.theme]=(themeCounts[q.theme]||0)+1;});
const statsRow=document.getElementById('statsRow');
[[quotes.length,'Quotes'],[Object.keys(authorCounts).length,'Authors'],[Object.keys(themeCounts).length,'Themes']].forEach(([n,l])=>{statsRow.insertAdjacentHTML('beforeend',`<div class="stat-item"><span class="stat-number">${n}</span><span class="stat-label">${l}</span></div>`);});

const af=document.getElementById('authorFilter');
Object.keys(authorCounts).sort().forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;af.appendChild(o);});
af.addEventListener('change',e=>{currentAuthor=e.target.value;renderQuotes();});

const allThemes=['All',...Object.keys(themeCounts).sort()];
const tb=document.getElementById('themesBar');
allThemes.forEach(t=>{const b=document.createElement('button');b.className='theme-pill'+(t==='All'?' active':'');b.textContent=t;b.addEventListener('click',()=>{currentTheme=t;document.querySelectorAll('.theme-pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');renderQuotes();});tb.appendChild(b);});

document.getElementById('searchInput').addEventListener('input',e=>{currentSearch=e.target.value;renderQuotes();});
document.getElementById('gridBtn').addEventListener('click',()=>{currentView='grid';document.getElementById('gridBtn').classList.add('active');document.getElementById('listBtn').classList.remove('active');renderQuotes();});
document.getElementById('listBtn').addEventListener('click',()=>{currentView='list';document.getElementById('listBtn').classList.add('active');document.getElementById('gridBtn').classList.remove('active');renderQuotes();});

function getFiltered(){return quotes.filter(q=>{const s=currentSearch.toLowerCase();const ms=!s||q.text.toLowerCase().includes(s)||q.author.toLowerCase().includes(s)||q.source.toLowerCase().includes(s);return ms&&(!currentAuthor||q.author===currentAuthor)&&(currentTheme==='All'||q.theme===currentTheme);});}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderQuotes(){
  const filtered=getFiltered();const container=document.getElementById('quotesContainer');
  document.getElementById('resultsInfo').textContent=`${filtered.length} of ${quotes.length}`;
  if(filtered.length===0){container.innerHTML='<div class="no-results">No quotes matching your search.<br><span style="font-size:.9rem;opacity:.6">The machine has not spoken on this.</span></div>';return;}
  if(currentView==='grid'){
    container.innerHTML='<div class="grid-view">'+filtered.map(q=>{const tc=themeColors[q.theme]||'#384878';return`<div class="quote-card" data-id="${q.id}"><div class="quote-number">${esc(q.author)}</div><p class="quote-text">${esc(q.text)}</p><div class="quote-footer"><div class="quote-attribution"><span class="quote-source">${esc(q.source)}</span></div><span class="quote-theme-badge" style="color:${tc};border-color:${tc}55">${esc(q.theme)}</span></div></div>`;}).join('')+'</div>';
  } else {
    container.innerHTML='<div class="list-view">'+filtered.map(q=>{const tc=themeColors[q.theme]||'#384878';return`<div class="list-quote-card" data-id="${q.id}"><div class="list-number" style="color:${tc}">${esc(q.theme)}</div><div class="list-content"><p class="list-text">&#x201C;${esc(q.text)}&#x201D;</p><div class="list-meta"><span class="list-author">${esc(q.author)}</span><span class="list-source">${esc(q.source)}</span></div></div></div>`;}).join('')+'</div>';
  }
  container.querySelectorAll('[data-id]').forEach(el=>{el.addEventListener('click',()=>{const q=quotes.find(x=>x.id===parseInt(el.dataset.id));if(q)openModal(q);});});
}

function openModal(q){
  document.getElementById('modalNumber').textContent=q.theme.toUpperCase();
  document.getElementById('modalText').textContent='“'+q.text+'”';
  document.getElementById('modalAuthor').textContent=q.author;
  document.getElementById('modalSource').textContent=q.source;
  document.getElementById('modalTheme').textContent=q.theme;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderQuotes();

// ── URL PARAMETER: ?id=N opens that quote's modal on load ──
(function(){
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');
  if (!idParam) return;
  const target = quotes.find(q => q.id === parseInt(idParam));
  if (!target) return;
  // Scroll past hero to the collection so the page feels anchored
  document.getElementById('collection').scrollIntoView({behavior:'instant'});
  // Small delay lets the layout settle before the modal opens
  setTimeout(() => openModal(target), 120);
})();
</script>
</body>
</html>
