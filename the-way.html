 <style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  /* ── LIGHT MODE TOKENS (default) ──────────────────────── */
  :root {
    --bg-page:        #f5f0e8;
    --bg-hero:        #ede6d6;
    --bg-header:      linear-gradient(180deg, #e8dfc8 0%, #f0e8d4 100%);
    --bg-controls:    #ede6d6;
    --bg-themes:      #f5f0e8;
    --bg-card:        #faf7f0;
    --bg-card-hover:  #ffffff;
    --bg-input:       #faf6ee;
    --bg-modal:       #faf7f0;
    --bg-vbtn-active: #c8a84b;

    --border-header:  #d4c090;
    --border-controls:#d4c090;
    --border-themes:  #e0d4b0;
    --border-card:    #e0d4b0;
    --border-card-hov:#c8a84b;
    --border-input:   #c8b07a;
    --border-pill:    #d4c090;
    --border-modal:   #c8a84b;

    --text-body:      #2c2416;
    --text-hero-q:    #1e1810;
    --text-muted:     #9a8060;
    --text-faint:     #b0986a;
    --text-author:    #7a5e20;
    --text-accent:    #9a7c3a;
    --text-gold:      #c8a84b;
    --text-title:     #4a3410;
    --text-subtitle:  #7a6840;
    --text-number:    #c8a84b;
    --text-vbtn:      #9a8060;
    --text-vbtn-act:  #ffffff;

    --shadow-card:    0 1px 4px rgba(100,70,20,0.06);
    --shadow-card-hov:0 6px 20px rgba(100,70,20,0.10);
    --shadow-controls:0 2px 8px rgba(100,70,20,0.08);
    --shadow-modal:   0 20px 60px rgba(80,50,10,0.25);
    --overlay-bg:     rgba(40,28,10,0.55);

    --grid-line:      rgba(160,120,50,0.07);
    --hero-glow1:     rgba(180,140,60,0.12);
    --hero-glow2:     rgba(160,120,50,0.07);
    --hero-glow3:     rgba(140,100,40,0.06);
    --quote-mark-col: rgba(200,168,75,0.6);
  }

  /* ── DARK MODE TOKENS ─────────────────────────────────── */
  [data-theme="dark"] {
    --bg-page:        #0d0c0a;
    --bg-hero:        #0a0907;
    --bg-header:      linear-gradient(180deg, #1a1710 0%, #0d0c0a 100%);
    --bg-controls:    #110f0c;
    --bg-themes:      #0f0e0b;
    --bg-card:        #141210;
    --bg-card-hover:  #181510;
    --bg-input:       #1a1710;
    --bg-modal:       #141210;
    --bg-vbtn-active: #3a3020;

    --border-header:  #3a3020;
    --border-controls:#2a2015;
    --border-themes:  #2a2015;
    --border-card:    #2a2015;
    --border-card-hov:#5a4a2a;
    --border-input:   #3a3020;
    --border-pill:    #2a2015;
    --border-modal:   #5a4a2a;

    --text-body:      #d4c9a8;
    --text-hero-q:    #e8d9a8;
    --text-muted:     #6a5a3a;
    --text-faint:     #5a4a2a;
    --text-author:    #c8a84b;
    --text-accent:    #9a7c3a;
    --text-gold:      #c8a84b;
    --text-title:     #c8a84b;
    --text-subtitle:  #8a7a5a;
    --text-number:    #4a3a1a;
    --text-vbtn:      #6a5a3a;
    --text-vbtn-act:  #c8a84b;

    --shadow-card:    none;
    --shadow-card-hov:none;
    --shadow-controls:none;
    --shadow-modal:   0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(140,100,30,0.1);
    --overlay-bg:     rgba(0,0,0,0.85);

    --grid-line:      rgba(120,90,30,0.04);
    --hero-glow1:     rgba(160,120,40,0.10);
    --hero-glow2:     rgba(100,70,20,0.06);
    --hero-glow3:     rgba(80,60,20,0.05);
    --quote-mark-col: #4a3a1a;
  }

  body {
    min-height: 100vh;
    background: var(--bg-page);
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: var(--text-body);
    transition: background 0.35s ease, color 0.35s ease;
  }

  /* ── THEME TOGGLE ─────────────────────────────────────── */
  .theme-toggle {
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    color: var(--text-muted);
    width: 2.4rem;
    height: 2.4rem;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .theme-toggle:hover { border-color: var(--text-accent); color: var(--text-accent); }
  .theme-toggle .icon-sun,
  .theme-toggle .icon-moon {
    position: absolute;
    line-height: 1;
    transition: opacity 0.3s, transform 0.3s;
  }
  .theme-toggle .icon-sun  { opacity: 0; transform: rotate(90deg) scale(0.5); }
  .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg)  scale(1);   }
  [data-theme="dark"] .theme-toggle .icon-sun  { opacity: 1; transform: rotate(0deg)   scale(1);   }
  [data-theme="dark"] .theme-toggle .icon-moon { opacity: 0; transform: rotate(-90deg) scale(0.5); }

  .hero-theme-toggle {
    position: absolute;
    top: 1.5rem;
    right: 1.75rem;
    z-index: 10;
  }

  /* ── HERO ─────────────────────────────────────────────── */
  .hero-section {
    position: relative;
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5rem 2rem 5rem;
    overflow: hidden;
    background: var(--bg-hero);
    transition: background 0.35s ease;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, var(--hero-glow1) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 80%, var(--hero-glow2) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 20%, var(--hero-glow3) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
  }

  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.5em;
    color: var(--text-accent);
    text-transform: uppercase;
    margin-bottom: 3rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '';
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--text-accent));
  }
  .hero-eyebrow::after {
    background: linear-gradient(90deg, var(--text-accent), transparent);
  }

  .hero-quote-wrap {
    max-width: 820px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .hero-quote-wrap.fading {
    opacity: 0;
    transform: translateY(10px);
  }

  .hero-open-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 7rem;
    color: var(--text-gold);
    line-height: 0.4;
    display: block;
    margin-bottom: 0.5rem;
    user-select: none;
    opacity: 0.5;
  }

  .hero-quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.65;
    color: var(--text-hero-q);
    margin-bottom: 2.5rem;
    letter-spacing: 0.01em;
    transition: color 0.35s ease;
  }

  .hero-attribution {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }

  .hero-author-line {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-rule {
    width: 30px;
    height: 1px;
    background: var(--text-accent);
  }

  .hero-author {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: var(--text-author);
    text-transform: uppercase;
  }

  .hero-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--text-muted);
  }

  .hero-theme-pill {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.25rem 0.75rem;
    border: 1px solid var(--text-gold);
    color: var(--text-accent);
    margin-bottom: 3rem;
    background: rgba(200,168,75,0.08);
  }

  .hero-refresh-btn {
    background: none;
    border: 1px solid var(--border-input);
    color: var(--text-author);
    padding: 0.75rem 2rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s, background 0.25s;
  }

  .hero-refresh-btn:hover {
    border-color: var(--text-accent);
    color: var(--text-body);
    background: rgba(160,120,40,0.08);
  }

  .hero-scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-accent);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: scrollBounce 2s ease-in-out infinite;
    text-decoration: none;
  }

  .hero-scroll-arrow {
    width: 1px;
    height: 24px;
    background: linear-gradient(180deg, var(--text-accent), transparent);
  }

  @keyframes scrollBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(6px); }
  }

  /* ── STATS HEADER ─────────────────────────────────────── */
  .stoic-header {
    background: var(--bg-header);
    border-bottom: 1px solid var(--border-header);
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.35s ease;
  }

  .stoic-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,168,75,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-ornament {
    font-family: 'Cinzel', serif;
    color: var(--text-accent);
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 600;
    color: var(--text-title);
    letter-spacing: 0.08em;
    line-height: 1.1;
    margin-bottom: 0.5rem;
    transition: color 0.35s ease;
  }

  .header-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: var(--text-subtitle);
    margin-bottom: 1.5rem;
    transition: color 0.35s ease;
  }

  .header-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
    margin: 0 auto 1.5rem;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 2rem 3rem;
  }

  .stat-item { text-align: center; }

  .stat-number {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    color: var(--text-author);
    font-weight: 600;
    display: block;
    transition: color 0.35s ease;
  }

  .stat-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: color 0.35s ease;
  }

  /* ── CONTROLS ─────────────────────────────────────────── */
  .controls {
    background: var(--bg-controls);
    border-bottom: 1px solid var(--border-controls);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: var(--shadow-controls);
    transition: background 0.35s ease, border-color 0.35s ease;
  }

  .search-input {
    flex: 1;
    min-width: 180px;
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    color: var(--text-body);
    padding: 0.6rem 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.35s ease, color 0.35s ease;
  }
  .search-input:focus { border-color: var(--text-accent); box-shadow: 0 0 0 3px rgba(154,124,58,0.12); }
  .search-input::placeholder { color: var(--text-faint); font-style: italic; }

  .filter-select {
    background: var(--bg-input);
    border: 1px solid var(--border-input);
    color: var(--text-body);
    padding: 0.6rem 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s, background 0.35s ease, color 0.35s ease;
  }
  .filter-select:focus { border-color: var(--text-accent); }

  .view-toggle { display: flex; border: 1px solid var(--border-input); overflow: hidden; transition: border-color 0.35s ease; }

  .view-btn {
    background: var(--bg-input);
    border: none;
    color: var(--text-vbtn);
    padding: 0.6rem 0.85rem;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .view-btn.active { background: var(--bg-vbtn-active); color: var(--text-vbtn-act); }

  .results-info {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
    white-space: nowrap;
    transition: color 0.35s ease;
  }

  /* ── THEMES BAR ───────────────────────────────────────── */
  .themes-bar {
    background: var(--bg-themes);
    border-bottom: 1px solid var(--border-themes);
    padding: 0.75rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .themes-bar::-webkit-scrollbar { display: none; }

  .theme-pill {
    background: none;
    border: 1px solid var(--border-pill);
    color: var(--text-muted);
    padding: 0.3rem 0.8rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .theme-pill:hover { border-color: var(--text-accent); color: var(--text-body); background: rgba(154,124,58,0.06); }
  .theme-pill.active { background: var(--text-gold); border-color: var(--text-gold); color: #fff; }

  /* ── CONTENT AREA ─────────────────────────────────────── */
  .content {
    padding: 2rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    background: var(--bg-page);
    transition: background 0.35s ease;
  }

  /* ── GRID VIEW ────────────────────────────────────────── */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .quote-card {
    background: var(--bg-card);
    border: 1px solid var(--border-card);
    padding: 1.75rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .quote-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, transparent, var(--text-gold), transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .quote-card:hover { border-color: var(--border-card-hov); background: var(--bg-card-hover); transform: translateY(-2px); box-shadow: var(--shadow-card-hov); }
  .quote-card:hover::before { opacity: 1; }

  .quote-number {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--text-number);
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
    transition: color 0.35s ease;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    line-height: 1.75;
    color: var(--text-body);
    font-style: italic;
    margin-bottom: 1.25rem;
    transition: color 0.35s ease;
  }

  .quote-text::before {
    content: '\201C';
    font-size: 2.5rem;
    color: var(--quote-mark-col);
    line-height: 0;
    vertical-align: -0.8rem;
    margin-right: 0.1rem;
    font-style: normal;
  }

  .quote-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.75rem;
  }

  .quote-attribution { flex: 1; }

  .quote-author {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--text-author);
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 0.2rem;
    transition: color 0.35s ease;
  }

  .quote-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
    transition: color 0.35s ease;
  }

  .quote-theme-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border: 1px solid;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── LIST VIEW ────────────────────────────────────────── */
  .list-view { display: flex; flex-direction: column; }

  .list-quote-card {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-card);
    padding: 1.4rem 2rem;
    display: flex;
    gap: 2rem;
    align-items: flex-start;
    cursor: pointer;
    transition: background 0.2s;
  }
  .list-quote-card:hover { background: var(--bg-card-hover); }

  .list-number {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: var(--text-number);
    letter-spacing: 0.1em;
    min-width: 2.5rem;
    padding-top: 0.25rem;
    transition: color 0.35s ease;
  }

  .list-content { flex: 1; }

  .list-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    line-height: 1.65;
    color: var(--text-body);
    font-style: italic;
    margin-bottom: 0.5rem;
    transition: color 0.35s ease;
  }

  .list-meta {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .list-author {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: var(--text-author);
    letter-spacing: 0.1em;
    transition: color 0.35s ease;
  }

  .list-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: var(--text-muted);
    font-style: italic;
    transition: color 0.35s ease;
  }

  .list-theme {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── MODAL ────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay-bg);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg-modal);
    border: 1px solid var(--border-modal);
    max-width: 640px;
    width: 100%;
    padding: 3rem;
    position: relative;
    box-shadow: var(--shadow-modal);
    transform: translateY(16px);
    transition: transform 0.3s, background 0.35s ease;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--text-gold), transparent);
  }

  .modal-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    background: none;
    border: 1px solid var(--border-pill);
    color: var(--text-muted);
    width: 2rem; height: 2rem;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Cinzel', serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { border-color: var(--text-accent); color: var(--text-body); }

  .modal-number {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: var(--text-gold);
    letter-spacing: 0.3em;
    margin-bottom: 1.5rem;
  }

  .modal-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    line-height: 1.8;
    color: var(--text-hero-q);
    font-style: italic;
    margin-bottom: 2rem;
    transition: color 0.35s ease;
  }

  .modal-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, var(--text-gold), transparent);
    margin-bottom: 1.5rem;
  }

  .modal-author {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: var(--text-author);
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
    transition: color 0.35s ease;
  }

  .modal-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 1.5rem;
    transition: color 0.35s ease;
  }

  .modal-theme {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border: 1px solid var(--text-gold);
    color: var(--text-accent);
    background: rgba(200,168,75,0.08);
  }

  /* ── NO RESULTS ───────────────────────────────────────── */
  .no-results {
    text-align: center;
    padding: 5rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: var(--text-muted);
    font-style: italic;
    line-height: 2;
  }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 640px) {
    .stats-row { gap: 1.2rem 2rem; }
    .grid-view { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
    .search-input { width: 100%; }
    .list-quote-card { padding: 1.2rem; gap: 1rem; }
    .modal { padding: 2rem 1.5rem; }
    .modal-text { font-size: 1.15rem; }
  }

  /* ── SHARE BUTTON ─────────────────────────────────────── */
  .share-btn {
    background: none;
    border: 1px solid var(--border-pill);
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.18rem 0.5rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    line-height: 1;
    vertical-align: middle;
    align-self: flex-end;
  }
  .share-btn:hover { border-color: var(--text-accent); color: var(--text-accent); }
  .share-btn svg {
    width: 0.6rem; height: 0.6rem;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* ── MODAL SHARE BUTTON ───────────────────────────────── */
  .modal-share-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    background: none;
    border: 1px solid var(--border-pill);
    color: var(--text-muted);
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-top: 0;
  }
  .modal-share-btn:hover { border-color: var(--text-accent); color: var(--text-accent); }
  .modal-share-btn svg {
    width: 0.65rem; height: 0.65rem;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* ── TOAST ────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--text-title);
    color: var(--bg-page);
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.55rem 1.25rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 2000;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── HERO SHARE BUTTON ────────────────────────────────── */
  .hero-share-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    justify-content: center;
  }
  .hero-share-btn {
    background: none;
    border: 1px solid var(--border-input);
    color: var(--text-author);
    padding: 0.75rem 1.5rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s, background 0.25s;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .hero-share-btn:hover {
    border-color: var(--text-accent);
    color: var(--text-body);
    background: rgba(0,0,0,0.04);
  }
  .hero-share-btn svg {
    width: 0.7rem; height: 0.7rem;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero-section" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>

  <button class="theme-toggle hero-theme-toggle" id="themeToggle" title="Toggle dark / light mode">
    <span class="icon-sun">☀︎</span>
    <span class="icon-moon">☽</span>
  </button>

  <div class="hero-eyebrow">Principles &amp; Practice</div>

  <div class="hero-quote-wrap" id="heroWrap">
    <span class="hero-open-quote">&ldquo;</span>
    <p class="hero-quote-text" id="heroText"></p>
    <div class="hero-attribution">
      <div class="hero-author-line">
        <span class="hero-rule"></span>
        <span class="hero-author" id="heroAuthor"></span>
        <span class="hero-rule"></span>
      </div>
      <span class="hero-source" id="heroSource"></span>
    </div>
    <span class="hero-theme-pill" id="heroTheme"></span>
  </div>

  <div class="hero-share-row">
    <button class="hero-refresh-btn" id="refreshBtn">&#8635;&nbsp;&nbsp;New Saying</button>
    <button class="hero-share-btn" id="heroShareBtn"><svg viewBox="0 0 24 24" style="width:.7rem;height:.7rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>
  </div>

  <a href="#collection" class="hero-scroll-hint">
    <span>All Sayings</span>
    <div class="hero-scroll-arrow"></div>
  </a>
</section>

<!-- STATS HEADER -->
<div class="stoic-header" id="collection">
  <div class="header-ornament">⬡ &nbsp; Principles &amp; Practice &nbsp; ⬡</div>
  <h1 class="header-title">LEADERSHIP SAYINGS</h1>
  <p class="header-subtitle">Principles from Army leadership, software engineering, lean, and systems thinking</p>
  <div class="header-divider"></div>
  <div class="stats-row" id="statsRow"></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input class="search-input" id="searchInput" placeholder="Search sayings, authors, sources…" type="text">
  <select class="filter-select" id="authorFilter">
    <option value="">All Authors</option>
    <option>Marcus Aurelius</option>
    <option>Seneca</option>
    <option>Epictetus</option>
    <option>Zeno of Citium</option>
    <option>Musonius Rufus</option>
    <option>Cleanthes</option>
    <option>Chrysippus</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="gridBtn" title="Grid view">&#x229E;</button>
    <button class="view-btn" id="listBtn" title="List view">&#9776;</button>
  </div>
  <span class="results-info" id="resultsInfo"></span>
</div>

<!-- THEMES BAR -->
<div class="themes-bar" id="themesBar"></div>

<!-- QUOTES CONTAINER -->
<div class="content">
  <div id="quotesContainer"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-number" id="modalNumber"></div>
    <p class="modal-text" id="modalText"></p>
    <div class="modal-divider"></div>
    <div class="modal-author" id="modalAuthor"></div>
    <div class="modal-source" id="modalSource"></div>
    <div style="display:flex;align-items:center;gap:.75rem;margin-top:0;flex-wrap:wrap;">
      <span class="modal-theme" id="modalTheme"></span>
      <button class="modal-share-btn" id="modalShareBtn">
        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Copy Share Link
      </button>
    </div>
  </div>
</div>
<div class="toast" id="toast">Link copied to clipboard</div>

<script src="the-way-quotes-data.js"></script>

<script>
// ── THEME TOGGLE ───────────────────────────────────────────
const htmlEl = document.documentElement;
const saved = localStorage.getItem('leadership-theme');
if (saved === 'dark') htmlEl.setAttribute('data-theme', 'dark');

document.getElementById('themeToggle').addEventListener('click', () => {
  const isDark = htmlEl.getAttribute('data-theme') === 'dark';
  if (isDark) {
    htmlEl.removeAttribute('data-theme');
    localStorage.setItem('leadership-theme', 'light');
  } else {
    htmlEl.setAttribute('data-theme', 'dark');
    localStorage.setItem('leadership-theme', 'dark');
  }
});



const themeColors = {
  "Systems Thinking": "#4a6b5a",
  "First Principles":  "#5a4a6b",
  "Mental Models":     "#6b5a3a",
  "Architecture":      "#3a5a6b",
  "Agile":             "#4a5a6b",
  "Project Management":"#6b4a3a",
  "Engineering":       "#3a6b5a",
  "Lean":              "#6b6b3a",
  "Army Leadership":   "#4a5a3a",
  "Leadership":        "#6b3a4a",
};

// ── STATE ──────────────────────────────────────────────────
let currentSearch = '';
let currentAuthor = '';
let currentTheme  = 'All';
let currentView   = 'grid';
let heroIdx       = Math.floor(Math.random() * quotes.length);

// ── HERO ───────────────────────────────────────────────────
function renderHero(q) {
  document.getElementById('heroText').textContent   = q.text;
  document.getElementById('heroAuthor').textContent = q.author;
  document.getElementById('heroSource').textContent = q.source;
  document.getElementById('heroTheme').textContent  = q.theme;
}

function cycleHero() {
  const wrap = document.getElementById('heroWrap');
  wrap.classList.add('fading');
  setTimeout(() => {
    let next;
    do { next = Math.floor(Math.random() * quotes.length); } while (next === heroIdx);
    heroIdx = next;
    renderHero(quotes[heroIdx]);
    wrap.classList.remove('fading');
  }, 400);
}

document.getElementById('refreshBtn').addEventListener('click', cycleHero);
document.getElementById('heroShareBtn').addEventListener('click', () => copyShareLink(quotes[heroIdx].id));
renderHero(quotes[heroIdx]);

// ── STATS ──────────────────────────────────────────────────
const authorCounts = {};
quotes.forEach(q => { authorCounts[q.author] = (authorCounts[q.author] || 0) + 1; });
const themeCounts = {};
quotes.forEach(q => { themeCounts[q.theme] = (themeCounts[q.theme] || 0) + 1; });
const statsRow = document.getElementById('statsRow');
[
  [quotes.length,                   'Sayings'],
  [Object.keys(authorCounts).length,'Sources'],
  [Object.keys(themeCounts).length, 'Themes' ],
].forEach(([n, label]) => {
  statsRow.insertAdjacentHTML('beforeend',
    `<div class="stat-item"><span class="stat-number">${n}</span><span class="stat-label">${label}</span></div>`);
});

// ── AUTHOR FILTER ──────────────────────────────────────────
const authorFilter = document.getElementById('authorFilter');
Object.keys(authorCounts).sort().forEach(a => {
  const opt = document.createElement('option');
  opt.value = a; opt.textContent = a;
  authorFilter.appendChild(opt);
});
authorFilter.addEventListener('change', e => { currentAuthor = e.target.value; renderQuotes(); });

// ── THEMES BAR ─────────────────────────────────────────────
const allThemes = ['All', ...Object.keys(themeCounts).sort()];
const themesBar = document.getElementById('themesBar');
allThemes.forEach(theme => {
  const btn = document.createElement('button');
  btn.className = 'theme-pill' + (theme === 'All' ? ' active' : '');
  btn.textContent = theme;
  btn.addEventListener('click', () => {
    currentTheme = theme;
    document.querySelectorAll('.theme-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQuotes();
  });
  themesBar.appendChild(btn);
});

// ── FILTER CONTROLS ────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  const url = new URL(window.location.href);
  if (currentSearch.trim()) { url.searchParams.set('q', currentSearch.trim()); }
  else { url.searchParams.delete('q'); }
  url.searchParams.delete('id');
  history.replaceState(null, '', url.toString());
  renderQuotes();
});

document.getElementById('gridBtn').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('gridBtn').classList.add('active');
  document.getElementById('listBtn').classList.remove('active');
  renderQuotes();
});

document.getElementById('listBtn').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('listBtn').classList.add('active');
  document.getElementById('gridBtn').classList.remove('active');
  renderQuotes();
});

// ── FILTER ─────────────────────────────────────────────────
function getFiltered() {
  return quotes.filter(q => {
    const tokens = currentSearch.toLowerCase().split(/\s+/).filter(Boolean);
    const haystack = (q.text + ' ' + q.author + ' ' + q.source + ' ' + q.theme).toLowerCase();
    const matchSearch = tokens.length === 0 || tokens.every(t => haystack.includes(t));
    const matchAuthor = !currentAuthor || q.author === currentAuthor;
    const matchTheme  = currentTheme === 'All' || q.theme === currentTheme;
    return matchSearch && matchAuthor && matchTheme;
  });
}

// ── SHARE UTILITIES ────────────────────────────────────────
const shareIcon = `<svg viewBox="0 0 24 24" style="width:.6rem;height:.6rem;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>`;

let toastTimer = null;
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function copyShareLink(id) {
  const url = new URL(window.location.href);
  url.search = '';
  if (id != null) url.searchParams.set('id', id);
  if (currentSearch.trim()) url.searchParams.set('q', currentSearch.trim());
  navigator.clipboard.writeText(url.toString()).then(showToast).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = url.toString(); ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast();
  });
}

function pad(n) { return String(n).padStart(3, '0'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── RENDER ─────────────────────────────────────────────────
function renderQuotes() {
  const filtered = getFiltered();
  const container = document.getElementById('quotesContainer');
  document.getElementById('resultsInfo').textContent = `${filtered.length} of ${quotes.length}`;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-results">No sayings matching your search.<br><span style="font-size:.9rem;color:#4a3a1a;opacity:.7">Try different terms.</span></div>`;
    return;
  }

  if (currentView === 'grid') {
    container.innerHTML = `<div class="grid-view">${filtered.map(q => {
      const tc = themeColors[q.theme] || '#5a4a2a';
      return `
        <div class="quote-card" data-id="${q.id}">
          <div class="quote-number">${esc(q.author)}</div>
          <p class="quote-text">${esc(q.text)}</p>
          <div class="quote-footer">
            <div class="quote-attribution">
              <span class="quote-source">${esc(q.source)}</span>
            </div>
            <div style="display:flex;align-items:flex-end;gap:.5rem;flex-shrink:0">
              <span class="quote-theme-badge" style="color:${tc};border-color:${tc}60">${esc(q.theme)}</span>
              <button class="share-btn" data-share-id="${q.id}" title="Copy share link">${shareIcon}Share</button>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="list-view">${filtered.map(q => {
      const tc = themeColors[q.theme] || '#5a4a2a';
      return `
        <div class="list-quote-card" data-id="${q.id}">
          <div class="list-number" style="font-size:.52rem;min-width:3.5rem;color:${tc};text-transform:uppercase;letter-spacing:.08em">${esc(q.theme)}</div>
          <div class="list-content">
            <p class="list-text">\u201C${esc(q.text)}\u201D</p>
            <div class="list-meta">
              <span class="list-author">${esc(q.author)}</span>
              <span class="list-source">${esc(q.source)}</span>
              <button class="share-btn" data-share-id="${q.id}" title="Copy share link">${shareIcon}Share</button>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  container.querySelectorAll('[data-id]').forEach(el => {
    el.querySelectorAll('.share-btn').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); copyShareLink(parseInt(btn.dataset.shareId)); });
    });
    el.addEventListener('click', () => {
      const q = quotes.find(x => x.id === parseInt(el.dataset.id));
      if (q) openModal(q);
    });
  });
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(q) {
  document.getElementById('modalNumber').textContent = q.theme.toUpperCase();
  document.getElementById('modalText').textContent   = `\u201C${q.text}\u201D`;
  document.getElementById('modalAuthor').textContent = q.author;
  document.getElementById('modalSource').textContent = q.source;
  document.getElementById('modalTheme').textContent  = q.theme;
  document.getElementById('modalShareBtn').onclick   = () => copyShareLink(q.id);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ───────────────────────────────────────────────────
renderQuotes();

// ── URL PARAMETERS ─────────────────────────────────────────
(function () {
  const params = new URLSearchParams(window.location.search);
  const qParam = params.get('q');
  if (qParam) {
    currentSearch = qParam;
    document.getElementById('searchInput').value = qParam;
    renderQuotes();
    document.getElementById('collection').scrollIntoView({ behavior: 'instant' });
  }
  const idParam = params.get('id');
  if (!idParam) return;
  const target = quotes.find(q => q.id === parseInt(idParam));
  if (!target) return;
  document.getElementById('collection').scrollIntoView({ behavior: 'instant' });
  setTimeout(() => openModal(target), 120);
})();
</script>
</body>
</html>
