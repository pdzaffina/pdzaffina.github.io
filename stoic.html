<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stoic Wisdom — 100 Essential Teachings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    background: #0d0c0a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #d4c9a8;
  }

  /* ── HERO ─────────────────────────────────────────────── */
  .hero-section {
    position: relative;
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 5rem 2rem 5rem;
    overflow: hidden;
    background: #0a0907;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(160,120,40,0.10) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 80%, rgba(100,70,20,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 50% at 80% 20%, rgba(80,60,20,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(120,90,30,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,90,30,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
  }

  .hero-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.5em;
    color: #7a6030;
    text-transform: uppercase;
    margin-bottom: 3rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-eyebrow::before,
  .hero-eyebrow::after {
    content: '';
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #7a6030);
  }
  .hero-eyebrow::after {
    background: linear-gradient(90deg, #7a6030, transparent);
  }

  .hero-quote-wrap {
    max-width: 820px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .hero-quote-wrap.fading {
    opacity: 0;
    transform: translateY(10px);
  }

  .hero-open-quote {
    font-family: 'Cormorant Garamond', serif;
    font-size: 7rem;
    color: #3a2e10;
    line-height: 0.4;
    display: block;
    margin-bottom: 0.5rem;
    user-select: none;
  }

  .hero-quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 3.5vw, 2.5rem);
    font-style: italic;
    font-weight: 300;
    line-height: 1.65;
    color: #e8d9a8;
    margin-bottom: 2.5rem;
    letter-spacing: 0.01em;
  }

  .hero-attribution {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
  }

  .hero-author-line {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .hero-rule {
    width: 30px;
    height: 1px;
    background: #8a7040;
  }

  .hero-author {
    font-family: 'Cinzel', serif;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: #c8a84b;
    text-transform: uppercase;
  }

  .hero-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: #5a4a2a;
  }

  .hero-theme-pill {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.25rem 0.75rem;
    border: 1px solid #3a2e10;
    color: #7a6030;
    margin-bottom: 3rem;
  }

  .hero-refresh-btn {
    background: none;
    border: 1px solid #3a3020;
    color: #6a5a3a;
    padding: 0.75rem 2rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }

  .hero-refresh-btn:hover {
    border-color: #8a7040;
    color: #c8a84b;
  }

  .hero-scroll-hint {
    position: absolute;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    color: #3a2e10;
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    animation: scrollBounce 2s ease-in-out infinite;
    text-decoration: none;
  }

  .hero-scroll-arrow {
    width: 1px;
    height: 24px;
    background: linear-gradient(180deg, #3a2e10, transparent);
  }

  @keyframes scrollBounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(6px); }
  }

  /* ── STATS HEADER ─────────────────────────────────────── */
  .stoic-header {
    background: linear-gradient(180deg, #1a1710 0%, #0d0c0a 100%);
    border-bottom: 1px solid #3a3020;
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stoic-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-ornament {
    font-family: 'Cinzel', serif;
    color: #8a7040;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 600;
    color: #c8a84b;
    letter-spacing: 0.08em;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  .header-subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-style: italic;
    color: #8a7a5a;
    margin-bottom: 1.5rem;
  }

  .header-divider {
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #8a7040, transparent);
    margin: 0 auto 1.5rem;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 2rem 3rem;
  }

  .stat-item { text-align: center; }

  .stat-number {
    font-family: 'Cinzel', serif;
    font-size: 1.6rem;
    color: #c8a84b;
    font-weight: 600;
    display: block;
  }

  .stat-label {
    font-size: 0.7rem;
    color: #6a5a3a;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* ── CONTROLS ─────────────────────────────────────────── */
  .controls {
    background: #110f0c;
    border-bottom: 1px solid #2a2015;
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .search-input {
    flex: 1;
    min-width: 180px;
    background: #1a1710;
    border: 1px solid #3a3020;
    color: #d4c9a8;
    padding: 0.6rem 1rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: #8a7040; }
  .search-input::placeholder { color: #5a4a2a; font-style: italic; }

  .filter-select {
    background: #1a1710;
    border: 1px solid #3a3020;
    color: #d4c9a8;
    padding: 0.6rem 0.8rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .filter-select:focus { border-color: #8a7040; }

  .view-toggle { display: flex; border: 1px solid #3a3020; overflow: hidden; }

  .view-btn {
    background: #1a1710;
    border: none;
    color: #6a5a3a;
    padding: 0.6rem 0.85rem;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
  }
  .view-btn.active { background: #3a3020; color: #c8a84b; }

  .results-info {
    font-size: 0.75rem;
    color: #5a4a2a;
    font-family: 'Cinzel', serif;
    letter-spacing: 0.1em;
    white-space: nowrap;
  }

  /* ── THEMES BAR ───────────────────────────────────────── */
  .themes-bar {
    background: #0f0e0b;
    border-bottom: 1px solid #2a2015;
    padding: 0.75rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .themes-bar::-webkit-scrollbar { display: none; }

  .theme-pill {
    background: none;
    border: 1px solid #2a2015;
    color: #6a5a3a;
    padding: 0.3rem 0.8rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .theme-pill:hover { border-color: #8a7040; color: #c8a84b; }
  .theme-pill.active { background: #3a3020; border-color: #8a7040; color: #c8a84b; }

  /* ── CONTENT AREA ─────────────────────────────────────── */
  .content {
    padding: 2rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── GRID VIEW ────────────────────────────────────────── */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .quote-card {
    background: #141210;
    border: 1px solid #2a2015;
    padding: 1.75rem;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .quote-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, transparent, #8a7040, transparent);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .quote-card:hover { border-color: #5a4a2a; background: #181510; transform: translateY(-1px); }
  .quote-card:hover::before { opacity: 1; }

  .quote-number {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: #4a3a1a;
    letter-spacing: 0.2em;
    margin-bottom: 1rem;
  }

  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.7;
    color: #c8b884;
    font-style: italic;
    margin-bottom: 1.25rem;
  }

  .quote-text::before {
    content: '\201C';
    font-size: 2.5rem;
    color: #4a3a1a;
    line-height: 0;
    vertical-align: -0.8rem;
    margin-right: 0.1rem;
    font-style: normal;
  }

  .quote-footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 0.75rem;
  }

  .quote-attribution { flex: 1; }

  .quote-author {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: #c8a84b;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 0.2rem;
  }

  .quote-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: #5a4a2a;
    font-style: italic;
  }

  .quote-theme-badge {
    font-family: 'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border: 1px solid;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ── LIST VIEW ────────────────────────────────────────── */
  .list-view { display: flex; flex-direction: column; }

  .list-quote-card {
    background: #141210;
    border-bottom: 1px solid #2a2015;
    padding: 1.4rem 2rem;
    display: flex;
    gap: 2rem;
    align-items: flex-start;
    cursor: pointer;
    transition: background 0.2s;
  }
  .list-quote-card:hover { background: #181510; }

  .list-number {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    color: #4a3a1a;
    letter-spacing: 0.1em;
    min-width: 2.5rem;
    padding-top: 0.25rem;
  }

  .list-content { flex: 1; }

  .list-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    line-height: 1.6;
    color: #c8b884;
    font-style: italic;
    margin-bottom: 0.5rem;
  }

  .list-meta {
    display: flex;
    gap: 1.5rem;
    align-items: center;
    flex-wrap: wrap;
  }

  .list-author {
    font-family: 'Cinzel', serif;
    font-size: 0.62rem;
    color: #c8a84b;
    letter-spacing: 0.1em;
  }

  .list-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.8rem;
    color: #5a4a2a;
    font-style: italic;
  }

  .list-theme {
    font-family: 'Cinzel', serif;
    font-size: 0.52rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── MODAL ────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: #141210;
    border: 1px solid #5a4a2a;
    max-width: 640px;
    width: 100%;
    padding: 3rem;
    position: relative;
    box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 40px rgba(140,100,30,0.1);
    transform: translateY(16px);
    transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c8a84b, transparent);
  }

  .modal-close {
    position: absolute;
    top: 1.25rem; right: 1.25rem;
    background: none;
    border: 1px solid #3a3020;
    color: #6a5a3a;
    width: 2rem; height: 2rem;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: 'Cinzel', serif;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { border-color: #8a7040; color: #c8a84b; }

  .modal-number {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: #5a4a2a;
    letter-spacing: 0.3em;
    margin-bottom: 1.5rem;
  }

  .modal-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    line-height: 1.8;
    color: #d4c49a;
    font-style: italic;
    margin-bottom: 2rem;
  }

  .modal-divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, #8a7040, transparent);
    margin-bottom: 1.5rem;
  }

  .modal-author {
    font-family: 'Cinzel', serif;
    font-size: 1rem;
    color: #c8a84b;
    letter-spacing: 0.15em;
    margin-bottom: 0.4rem;
  }

  .modal-source {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.95rem;
    color: #6a5a3a;
    font-style: italic;
    margin-bottom: 1.5rem;
  }

  .modal-theme {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.3rem 0.8rem;
    border: 1px solid #5a4a2a;
    color: #8a7040;
  }

  /* ── NO RESULTS ───────────────────────────────────────── */
  .no-results {
    text-align: center;
    padding: 5rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    color: #5a4a2a;
    font-style: italic;
    line-height: 2;
  }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 640px) {
    .stats-row { gap: 1.2rem 2rem; }
    .grid-view { grid-template-columns: 1fr; }
    .controls { flex-direction: column; }
    .search-input { width: 100%; }
    .list-quote-card { padding: 1.2rem; gap: 1rem; }
    .modal { padding: 2rem 1.5rem; }
    .modal-text { font-size: 1.15rem; }
  }
</style>
</head>
<body>

<!-- HERO -->
<section class="hero-section" id="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>

  <div class="hero-eyebrow">Ancient Wisdom</div>

  <div class="hero-quote-wrap" id="heroWrap">
    <span class="hero-open-quote">&ldquo;</span>
    <p class="hero-quote-text" id="heroText"></p>
    <div class="hero-attribution">
      <div class="hero-author-line">
        <span class="hero-rule"></span>
        <span class="hero-author" id="heroAuthor"></span>
        <span class="hero-rule"></span>
      </div>
      <span class="hero-source" id="heroSource"></span>
    </div>
    <span class="hero-theme-pill" id="heroTheme"></span>
  </div>

  <button class="hero-refresh-btn" id="refreshBtn">&#8635;&nbsp;&nbsp;New Reflection</button>

  <a href="#collection" class="hero-scroll-hint">
    <span>Explore All</span>
    <div class="hero-scroll-arrow"></div>
  </a>
</section>

<!-- STATS HEADER -->
<div class="stoic-header" id="collection">
  <div class="header-ornament">✦ &nbsp; Ancient Wisdom &nbsp; ✦</div>
  <h1 class="header-title">STOIC WISDOM</h1>
  <p class="header-subtitle">One hundred essential teachings from the philosophers of virtue</p>
  <div class="header-divider"></div>
  <div class="stats-row" id="statsRow"></div>
</div>

<!-- CONTROLS -->
<div class="controls">
  <input class="search-input" id="searchInput" placeholder="Search the wisdom of the ancients…" type="text">
  <select class="filter-select" id="authorFilter">
    <option value="">All Authors</option>
    <option>Marcus Aurelius</option>
    <option>Seneca</option>
    <option>Epictetus</option>
    <option>Zeno of Citium</option>
    <option>Musonius Rufus</option>
    <option>Cleanthes</option>
    <option>Chrysippus</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="gridBtn" title="Grid view">&#x229E;</button>
    <button class="view-btn" id="listBtn" title="List view">&#9776;</button>
  </div>
  <span class="results-info" id="resultsInfo"></span>
</div>

<!-- THEMES BAR -->
<div class="themes-bar" id="themesBar"></div>

<!-- QUOTES CONTAINER -->
<div class="content">
  <div id="quotesContainer"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-number" id="modalNumber"></div>
    <p class="modal-text" id="modalText"></p>
    <div class="modal-divider"></div>
    <div class="modal-author" id="modalAuthor"></div>
    <div class="modal-source" id="modalSource"></div>
    <span class="modal-theme" id="modalTheme"></span>
  </div>
</div>

<script>
const quotes = [
  { id:1,  text:"You have power over your mind, not outside events. Realize this, and you will find strength.", author:"Marcus Aurelius", source:"Meditations", theme:"Control" },
  { id:2,  text:"The impediment to action advances action. What stands in the way becomes the way.", author:"Marcus Aurelius", source:"Meditations", theme:"Adversity" },
  { id:3,  text:"Waste no more time arguing what a good man should be. Be one.", author:"Marcus Aurelius", source:"Meditations", theme:"Virtue" },
  { id:4,  text:"Very little is needed to make a happy life; it is all within yourself, in your way of thinking.", author:"Marcus Aurelius", source:"Meditations", theme:"Happiness" },
  { id:5,  text:"The best revenge is to be unlike him who performed the injury.", author:"Marcus Aurelius", source:"Meditations", theme:"Virtue" },
  { id:6,  text:"It never ceases to amaze me: we all love ourselves more than other people, but care more about their opinion than our own.", author:"Marcus Aurelius", source:"Meditations", theme:"Self-Knowledge" },
  { id:7,  text:"The soul becomes dyed with the colour of its thoughts.", author:"Marcus Aurelius", source:"Meditations", theme:"Mind" },
  { id:8,  text:"If it is not right, do not do it; if it is not true, do not say it.", author:"Marcus Aurelius", source:"Meditations", theme:"Virtue" },
  { id:9,  text:"Choose not to be harmed and you won't feel harmed. Don't feel harmed and you haven't been.", author:"Marcus Aurelius", source:"Meditations", theme:"Perception" },
  { id:10, text:"Accept the things to which fate binds you, and love the people with whom fate brings you together.", author:"Marcus Aurelius", source:"Meditations", theme:"Acceptance" },

  { id:13, text:"The happiness of your life depends upon the quality of your thoughts.", author:"Marcus Aurelius", source:"Meditations", theme:"Mind" },

  { id:39, text:"It is a rough road that leads to the heights of greatness.", author:"Seneca", source:"Letters from a Stoic", theme:"Adversity" },

  { id:48, text:"Omnia aliena sunt, tempus tantum nostrum est. All things are alien; time alone is ours.", author:"Seneca", source:"Letters from a Stoic", theme:"Time" },

  { id:58, text:"It is impossible for a man to learn what he thinks he already knows.", author:"Epictetus", source:"Discourses", theme:"Wisdom" },
  { id:59, text:"No great thing is created suddenly.", author:"Epictetus", source:"Discourses", theme:"Patience" },
  { id:60, text:"Know, first, who you are, and then adorn yourself accordingly.", author:"Epictetus", source:"Discourses", theme:"Self-Knowledge" },
  { id:61, text:"Curb your desire. Don't set your heart on so many things and you will get what you need.", author:"Epictetus", source:"Enchiridion", theme:"Desires" },
  { id:62, text:"It is the nature of the wise to resist pleasures, but the foolish to be a slave to them.", author:"Epictetus", source:"Discourses", theme:"Self-Discipline" },

  { id:64, text:"A ship should not ride on a single anchor, nor life on a single hope.", author:"Epictetus", source:"Discourses", theme:"Resilience" },

  { id:68, text:"If you are ever tempted to look for outside approval, realize that you have compromised your own integrity.", author:"Epictetus", source:"Enchiridion", theme:"Integrity" },
  { id:69, text:"Wealth consists not in having great possessions, but in having few wants.", author:"Epictetus", source:"Enchiridion", theme:"Wealth" },
  { id:70, text:"He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has.", author:"Epictetus", source:"Discourses", theme:"Gratitude" },
  { id:71, text:"Only the educated are free.", author:"Epictetus", source:"Discourses", theme:"Freedom" },
  { id:72, text:"Never say about anything, I have lost it; but I have restored it.", author:"Epictetus", source:"Enchiridion", theme:"Loss" },
  { id:73, text:"How long are you going to wait before you demand the best of yourself?", author:"Epictetus", source:"Discourses", theme:"Self-Discipline" },
  { id:74, text:"The greater the difficulty, the more glory in surmounting it.", author:"Epictetus", source:"Discourses", theme:"Adversity" },

  { id:76, text:"Man conquers the world by conquering himself.", author:"Zeno of Citium", source:"Fragments", theme:"Self-Discipline" },
  { id:77, text:"All the good are friends of one another.", author:"Zeno of Citium", source:"Fragments", theme:"Virtue" },
  { id:78, text:"No loss should be more regrettable to us than losing our time, for it's irretrievable.", author:"Zeno of Citium", source:"Fragments", theme:"Time" },
  { id:79, text:"Steel your sensibilities, so that life shall hurt you as little as possible.", author:"Zeno of Citium", source:"Fragments", theme:"Resilience" },
  { id:80, text:"A bad feeling is a commotion of the mind repugnant to reason, and against nature.", author:"Zeno of Citium", source:"Fragments", theme:"Mind" },
  { id:81, text:"Extravagance is its own destroyer.", author:"Zeno of Citium", source:"Fragments", theme:"Moderation" },
  { id:82, text:"Well-being is attained little by little, and nevertheless is no little thing itself.", author:"Zeno of Citium", source:"Fragments", theme:"Happiness" },
  { id:83, text:"The goal of life is living in agreement with Nature.", author:"Zeno of Citium", source:"Fragments", theme:"Nature" },
  { id:84, text:"If you accomplish something good with hard work, the labor passes quickly, but the good endures.", author:"Musonius Rufus", source:"Lectures", theme:"Virtue" },
  { id:85, text:"Only in good actions is there true joy.", author:"Musonius Rufus", source:"Lectures", theme:"Happiness" },
  { id:86, text:"We should not prize material things or dread the lack of them.", author:"Musonius Rufus", source:"Lectures", theme:"Wealth" },
  { id:87, text:"The person who is truly educated is the one who is able to bear the things that happen to them and endure misfortune.", author:"Musonius Rufus", source:"Lectures", theme:"Resilience" },
  { id:88, text:"Begin at once, before it slips your mind, to apply reason to life.", author:"Musonius Rufus", source:"Lectures", theme:"Action" },
  { id:89, text:"Lead me, Zeus, and you too, Fate, wherever you have appointed for me to go.", author:"Cleanthes", source:"Hymn to Zeus", theme:"Acceptance" },
  { id:90, text:"The sun does not abandon its course on account of the blindness of some.", author:"Cleanthes", source:"Fragments", theme:"Purpose" },
  { id:91, text:"Take care of your body as if you were going to live forever; and take care of your soul as if you were going to die tomorrow.", author:"Chrysippus", source:"Fragments", theme:"Balance" },
  { id:92, text:"The universe is a single living creature which encompasses all living creatures within it.", author:"Chrysippus", source:"Fragments", theme:"Nature" },
  { id:93, text:"When you arise in the morning, think of what a precious privilege it is to be alive, to breathe, to think, to enjoy, to love.", author:"Marcus Aurelius", source:"Meditations", theme:"Gratitude" },
  { id:94, text:"Nowhere can man find a quieter or more untroubled retreat than in his own soul.", author:"Marcus Aurelius", source:"Meditations", theme:"Solitude" },
  { id:95, text:"The object of life is not to be on the side of the majority, but to escape finding oneself in the ranks of the insane.", author:"Marcus Aurelius", source:"Meditations", theme:"Integrity" },
  { id:96, text:"Everything we hear is an opinion, not a fact. Everything we see is a perspective, not the truth.", author:"Marcus Aurelius", source:"Meditations", theme:"Perception" },
  { id:97, text:"A gem cannot be polished without friction, nor a man perfected without trials.", author:"Seneca", source:"Letters from a Stoic", theme:"Adversity" },
  { id:98, text:"We are more often frightened than hurt; and we suffer more in imagination than in reality.", author:"Seneca", source:"Letters from a Stoic", theme:"Fear" },
  { id:99, text:"Associate with those who will make a better man of you.", author:"Seneca", source:"Letters from a Stoic", theme:"Relationships" },
  { id:100, text:"You want to live but do you know how to live? You are scared of dying and tell me, is the kind of life you lead really any different from being dead?", author:"Seneca", source:"Letters from a Stoic", theme:"Purpose" },
];

const themeColors = {
  "Control":"#8B6914","Adversity":"#6B4C3B","Virtue":"#4A6741","Happiness":"#7A5C3A",
  "Mind":"#4A5568","Perception":"#5C4A7A","Mortality":"#4A4A4A","Acceptance":"#4A6B6B",
  "Time":"#6B4A4A","Wisdom":"#4A5C4A","Purpose":"#5C4A6B","Resilience":"#6B5C4A",
  "Inner Strength":"#4A6B4A","Self-Knowledge":"#5C5C4A","Integrity":"#4A4A6B",
  "Gratitude":"#6B6B4A","Presence":"#4A6B5C","Freedom":"#4A5C6B","Desires":"#6B4A5C",
  "Self-Discipline":"#5C6B4A","Action":"#6B5C4A","Change":"#4A6B6B","Fear":"#5C4A4A",
  "Wealth":"#6B6B4A","Solitude":"#4A4A6B","Growth":"#4A6B4A","Loss":"#5C5C5C",
  "Patience":"#6B5C4A","Relationships":"#5C4A6B","Balance":"#6B4A6B","Nature":"#4A6B4A",
  "Moderation":"#6B6B4A","Equanimity":"#4A6B6B","Courage":"#6B4A4A","Knowledge":"#4A4A6B",
  "Character":"#5C6B4A",
};

// ── STATE ──────────────────────────────────────────────────
let currentSearch = '';
let currentAuthor = '';
let currentTheme  = 'All';
let currentView   = 'grid';
let heroIdx       = Math.floor(Math.random() * quotes.length);

// ── HERO ───────────────────────────────────────────────────
function renderHero(q) {
  document.getElementById('heroText').textContent   = q.text;
  document.getElementById('heroAuthor').textContent = q.author;
  document.getElementById('heroSource').textContent = q.source;
  document.getElementById('heroTheme').textContent  = q.theme;
}

function cycleHero() {
  const wrap = document.getElementById('heroWrap');
  wrap.classList.add('fading');
  setTimeout(() => {
    let next;
    do { next = Math.floor(Math.random() * quotes.length); } while (next === heroIdx);
    heroIdx = next;
    renderHero(quotes[heroIdx]);
    wrap.classList.remove('fading');
  }, 400);
}

document.getElementById('refreshBtn').addEventListener('click', cycleHero);
renderHero(quotes[heroIdx]);

// ── STATS ──────────────────────────────────────────────────
const authorCounts = {};
quotes.forEach(q => { authorCounts[q.author] = (authorCounts[q.author] || 0) + 1; });
const statsRow = document.getElementById('statsRow');
Object.entries(authorCounts).forEach(([author, count]) => {
  statsRow.insertAdjacentHTML('beforeend', `
    <div class="stat-item">
      <span class="stat-number">${count}</span>
      <span class="stat-label">${author.split(' ')[0]}</span>
    </div>
  `);
});

// ── THEMES BAR ─────────────────────────────────────────────
const allThemes = ['All', ...Array.from(new Set(quotes.map(q => q.theme))).sort()];
const themesBar = document.getElementById('themesBar');
allThemes.forEach(theme => {
  const btn = document.createElement('button');
  btn.className = 'theme-pill' + (theme === 'All' ? ' active' : '');
  btn.textContent = theme;
  btn.addEventListener('click', () => {
    currentTheme = theme;
    document.querySelectorAll('.theme-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderQuotes();
  });
  themesBar.appendChild(btn);
});

// ── FILTERS ────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value;
  renderQuotes();
});

document.getElementById('authorFilter').addEventListener('change', e => {
  currentAuthor = e.target.value;
  renderQuotes();
});

document.getElementById('gridBtn').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('gridBtn').classList.add('active');
  document.getElementById('listBtn').classList.remove('active');
  renderQuotes();
});

document.getElementById('listBtn').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('listBtn').classList.add('active');
  document.getElementById('gridBtn').classList.remove('active');
  renderQuotes();
});

// ── QUOTES RENDERER ────────────────────────────────────────
function getFiltered() {
  return quotes.filter(q => {
    const s = currentSearch.toLowerCase();
    const matchSearch  = !s || q.text.toLowerCase().includes(s) || q.author.toLowerCase().includes(s);
    const matchAuthor  = !currentAuthor || q.author === currentAuthor;
    const matchTheme   = currentTheme === 'All' || q.theme === currentTheme;
    return matchSearch && matchAuthor && matchTheme;
  });
}

function pad(n) { return String(n).padStart(3, '0'); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderQuotes() {
  const filtered = getFiltered();
  const container = document.getElementById('quotesContainer');
  document.getElementById('resultsInfo').textContent = `${filtered.length} of ${quotes.length}`;

  if (filtered.length === 0) {
    container.innerHTML = `<div class="no-results">No wisdom matching your search was found.<br><span style="font-size:0.9rem;color:#4a3a1a">Perhaps the ancients did not speak of this.</span></div>`;
    return;
  }

  if (currentView === 'grid') {
    container.innerHTML = `<div class="grid-view">${filtered.map(q => {
      const tc = themeColors[q.theme] || '#5a4a2a';
      return `
        <div class="quote-card" data-id="${q.id}">
          <div class="quote-number">No. ${pad(q.id)}</div>
          <p class="quote-text">${esc(q.text)}</p>
          <div class="quote-footer">
            <div class="quote-attribution">
              <span class="quote-author">${esc(q.author)}</span>
              <span class="quote-source">${esc(q.source)}</span>
            </div>
            <span class="quote-theme-badge" style="color:${tc};border-color:${tc}60">${esc(q.theme)}</span>
          </div>
        </div>`;
    }).join('')}</div>`;
  } else {
    container.innerHTML = `<div class="list-view">${filtered.map(q => {
      const tc = themeColors[q.theme] || '#5a4a2a';
      return `
        <div class="list-quote-card" data-id="${q.id}">
          <div class="list-number">${pad(q.id)}</div>
          <div class="list-content">
            <p class="list-text">\u201C${esc(q.text)}\u201D</p>
            <div class="list-meta">
              <span class="list-author">${esc(q.author)}</span>
              <span class="list-source">${esc(q.source)}</span>
              <span class="list-theme" style="color:${tc}">${esc(q.theme)}</span>
            </div>
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  // attach click handlers
  container.querySelectorAll('[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const q = quotes.find(x => x.id === parseInt(el.dataset.id));
      if (q) openModal(q);
    });
  });
}

// ── MODAL ──────────────────────────────────────────────────
function openModal(q) {
  document.getElementById('modalNumber').textContent = `QUOTE No. ${pad(q.id)}`;
  document.getElementById('modalText').textContent   = `\u201C${q.text}\u201D`;
  document.getElementById('modalAuthor').textContent = q.author;
  document.getElementById('modalSource').textContent = q.source;
  document.getElementById('modalTheme').textContent  = q.theme;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── INIT ───────────────────────────────────────────────────
renderQuotes();
</script>
</body>
</html>
